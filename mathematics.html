<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحاسبة الرياضية</title>

    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <!-- زر القائمة -->
    <button class="menu-btn" onclick="openMenu()">☰</button>

    <!-- زر الوضع المظلم -->
    <button class="dark-btn" onclick="toggleDarkMode()">🌙</button>

    <!-- القائمة -->
   <div id="sidebar" class="sidebar">

        <button class="close-btn" onclick="closeMenu()">×</button>

        <a href="home.html">الرئيسية</a>
        <a href="paga.html">رسومات الطلاب</a>
        <a href="pepol.html">ابرز الشخصيات </a>
        <a href="mathematics.html">العمليات الرياضية </a>
        <a href="communication.html">اتصل بنا</a>

    </div>

    <!-- العنوان -->
    <header>
        <h1>الحاسبة الرياضية</h1>
        <p>حساب بعض العمليات الرياضية بسهولة</p>
    </header>

    <!-- الحاسبات -->
    <div class="math-container">

        <!-- حجم الأسطوانة -->
        <div class="math-box">
            <h2>حجم الأسطوانة</h2>

            <input type="number" id="radius" placeholder="نصف القطر">
            <input type="number" id="height" placeholder="الارتفاع">

            <button onclick="cylinderVolume()">احسب</button>

            <p id="cylinderResult"></p>
        </div>

        <!-- مساحة الدائرة -->
        <div class="math-box">
            <h2>مساحة الدائرة</h2>

            <input type="number" id="circleRadius" placeholder="نصف القطر">

            <button onclick="circleArea()">احسب</button>

            <p id="circleResult"></p>
        </div>

        <!-- معادلة الدرجة الثانية -->
        <div class="math-box">
            <h2>حل معادلة الدرجة الثانية</h2>

            <input type="number" id="a" placeholder="a">
            <input type="number" id="b" placeholder="b">
            <input type="number" id="c" placeholder="c">

            <button onclick="quadratic()">احسب</button>

            <p id="quadraticResult"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
