<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="glass-card">
    <div class="logo">
        <i class="fas fa-user-astronaut"></i>
        <h2>تسجيل الدخول</h2>
        <p class="subtitle"مرحباً بك، أدخل بياناتك></p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            </div>
        </div>
        
        <div class="input-group">
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="كلمة المرور" required>
            </div>
        </div>

        <div class="options">
            <label class="remember">
                <input type="checkbox"> تذكرني
            </label>
            <a href="#" class="forgot">نسيت كلمة المرور؟</a>
        </div>
  
      <a href="home.html" class="login-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px;">
    دخول <i class="fas fa-arrow-left"></i>
</a>
    </form>

    <div class="footer-link">
        ليس لديك حساب؟ <a href="signup2.html">إنشاء حساب جديد</a>
    </div>
</div>


</body>
</html>
